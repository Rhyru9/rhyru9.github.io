    kicker: "// bug bounty · riset keamanan · jakarta, id"
    subtitle: "Security researcher yang berfokus pada aplikasi web, API, dan responsible vulnerability disclosure."
    intro: "Diakui oleh NASA, Apple, Ferrari, Pemerintah Belgia, dan berbagai perusahaan internasional atas kontribusi riset keamanan."
    about_heading: "Tentang"
    about:
      - "Saya adalah security researcher dan bug bounty hunter otodidak yang berbasis di Jakarta, Indonesia. Fokus pekerjaan saya adalah menemukan kerentanan pada aplikasi web, API, dan sistem bisnis kritis melalui pengujian manual dan analisis teknis mendalam."
      - "Perjalanan saya dimulai dari kompetisi CTF dan belajar mandiri, membangun fondasi dalam web exploitation, networking, dan programming. Seiring waktu, fondasi itu berkembang menjadi track record responsible disclosure ke berbagai organisasi — dari pemerintah daerah hingga perusahaan yang dikenal secara global."
      - "Setiap disclosure dilakukan dengan teliti — temuan didokumentasikan dengan jelas, dampak diidentifikasi secara akurat, dan sistem production tidak pernah terganggu. Disiplin ini lahir dari pengalaman bekerja dalam kerangka responsible disclosure dan program bug bounty publik selama bertahun-tahun."
    expertise_heading: "Area Keahlian"
    expertise:
      - title: "Keamanan Aplikasi Web"
        items: ["Autentikasi & Otorisasi", "Business Logic Flaw", "OWASP Top 10", "Manajemen Sesi"]
      - title: "Keamanan API & Backend"
        items: ["REST & GraphQL API", "IDOR & Privilege Escalation", "Paparan Data", "Rate Limiting Bypass"]
