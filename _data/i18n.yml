        label: "valid bugs"
      - number: "5+"
        label: "hall of fame"
      - number: "10+"
        label: "gov certs"
    highlights_heading: "Research Highlights"
    highlights_context: "200+ valid vulnerabilities disclosed across public and private programs — including systems operated by government agencies, universities, and international companies."
    contact_heading: "Contact"
    contact_labels:
