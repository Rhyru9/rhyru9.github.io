  home:
    title: "{{ site.title }}"
    kicker: "// bug bounty · security research · jakarta, id"
    subtitle: "Security researcher into web apps, APIs, and responsible vulnerability disclosure."
    intro: "Recognized by NASA, Apple, Ferrari, the Belgian Government, and others for responsible security research."
    about_heading: "About"
    about:
      - "I'm a self-taught security researcher and bug bounty hunter based in Jakarta, Indonesia. I focus on finding vulnerabilities in web apps, APIs, and business-critical systems — through manual testing and careful technical analysis."
      - "It started with CTF competitions and a lot of self-study. That foundation slowly turned into a real track record — responsible disclosures to organizations ranging from local governments to globally recognized companies."
      - "Every report is written with care. Findings are documented clearly, impact is scoped honestly, and production systems are never touched. That's a discipline I've built over years of working within responsible disclosure frameworks and public bug bounty programs."
    expertise_heading: "Areas of Focus"
    expertise:
      - title: "Web Application Security"
        items: ["Authentication & Authorization", "Business Logic Flaws", "OWASP Top 10", "Session Management"]
      - title: "API & Backend Security"
        items: ["REST & GraphQL APIs", "IDOR & Privilege Escalation", "Data Exposure", "Rate Limiting Bypass"]
      - title: "Vulnerability Research"
        items: ["Responsible Disclosure", "CVE Discovery", "PoC Development", "Security Writeups"]
    badges:
      - "Bug Bounty"
      - "Pentesting"
      - "CVE Research"
      - "Jakarta, ID"
    view_link: "View →"
    stats:
      - number: "200+"
        label: "valid bugs"
      - number: "7+"
        label: "hall of fame"
      - number: "10+"
        label: "gov recognitions"
    highlights_heading: "Research Highlights"
    highlights_context: "200+ valid vulnerabilities across public and private programs — including systems run by government agencies, universities, and international companies."
    contact_heading: "Contact"
    contact_labels:
      email: "email"
      twitter: "twitter"
      github: "github"
      linkedin: "linkedin"
      hackerone: "hackerone"
    footnote: "Happy to collaborate, chat about security research, or work through responsible disclosure together."
  blog:
    intro: "Technical writeups from real security research. Each post covers an actual vulnerability — how I found it, how it works, and what it means for defenders."
  achievements:
