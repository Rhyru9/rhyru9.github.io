      twitter: "twitter"
      github: "github"
      linkedin: "linkedin"
      hackerone: "hackerone"
    footnote: "Open to collaboration, security research discussions, and responsible disclosure coordination."
  blog:
    intro: "Technical writeups and case studies from security research work. Each post covers a real vulnerability — how it was found, how it works, and what it means for defenders."
