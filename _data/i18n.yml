  home:
    title: "{{ site.title }}"
    kicker: "// bug bounty · security research · jakarta, id"
    subtitle: "Security testing for web apps, APIs, and business systems before attackers find the gaps."
    intro: "Backed by disclosure work recognized by NASA, regional governments, and international companies."
    about_heading: "About"
    about:
      - "My work is simple to describe: I look for security weaknesses in websites, APIs, and business systems, then explain the risk in a way technical and non-technical teams can act on."
      - "The testing approach comes from bug bounty and responsible disclosure work, where findings need to be proven, documented clearly, and reported without disrupting production systems."
    focus_heading: "Who I Help"
    focus:
      - title: "Local businesses & startups"
        description: "Need a practical security check before launch, after a major update, or before handling more customer data"
      - title: "IT teams"
        description: "Need a second pair of eyes on login flows, admin panels, APIs, cloud storage, or internal dashboards"
      - title: "Recruiters & security teams"
        description: "Need evidence of hands-on vulnerability research, clear reporting, and responsible disclosure experience"
    services_heading: "Services"
    service_labels:
      deliverables: "Deliverables"
      pricing: "Pricing"
    services:
      - title: "Web & API Security Review"
        description: "Manual testing for authentication, authorization, exposed data, business logic flaws, and common web vulnerabilities."
        deliverables: "Report with proof-of-concept, severity, impact, affected endpoints, and remediation guidance."
        price: "Starts from Rp 3.000.000 for a limited scope."
      - title: "Startup Security Check"
        description: "Focused review for early-stage products that need to reduce obvious risk before launch or investor/customer demos."
        deliverables: "Prioritized issue list, quick wins, and a plain-language risk summary for founders or managers."
        price: "Starts from Rp 2.000.000 for a small product or landing-to-dashboard flow."
      - title: "Vulnerability Verification"
        description: "Validate suspected security issues from reports, scanners, logs, or external submissions."
        deliverables: "Confirmed impact, reproduction steps, false-positive notes, and recommended next action."
        price: "Starts from Rp 1.500.000 for 3-5 initial findings or one external submission."
    timeline: "Estimated turnaround for most small scopes: 3-7 business days, depending on system complexity."
    report_heading: "What You Receive"
    report_intro: "A concise security report, written so owners can understand the risk and developers can fix it."
    report_items:
      - title: "Executive summary"
        description: "Plain-language overview of what was tested, what matters most, and business impact."
      - title: "Findings table"
        description: "Severity, affected URL or feature, impact, reproduction status, and priority."
      - title: "Proof of concept"
        description: "Steps, request samples, screenshots when useful, and evidence with sensitive data masked."
      - title: "Remediation guidance"
        description: "Specific fixes, validation notes, and optional retest checklist."
    highlights_heading: "Highlights"
    highlights_context: "200+ valid vulnerabilities found across public and private programs, including systems used by government organizations and international companies."
    stats:
      - number: "200+"
        label: "valid bugs"
      - number: "5+"
        label: "hall of fame"
      - number: "10+"
        label: "gov certs"
    contact_heading: "Contact"
    contact_labels:
      email: "email"
      twitter: "twitter"
      github: "github"
      linkedin: "linkedin"
      hackerone: "hackerone"
    footnote: "Send the system scope, target URL type, and goal of the test. I will reply with a practical testing plan and the next step."
  blog:
    intro: "Technical case studies from security research work. Each writeup shows the kind of issue that can be found and fixed before it turns into business impact."
  achievements:
    label: "Achievements"
    title: "Security Achievements"
    intro: "A collection of vulnerabilities discovered, bounties earned, talks delivered, and contributions to the security community."
    awards: "Awards & Recognition"
    profiles: "Bug Bounty Profiles"
