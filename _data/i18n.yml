        description: "Penjelasan sederhana tentang apa yang diuji, risiko paling penting, dan dampak bisnisnya."
      - title: "Tabel temuan"
        description: "Severity, URL atau fitur terdampak, impact, status reproduksi, dan prioritas."
      - title: "Proof of concept"
        description: "Langkah reproduksi, contoh request, screenshot jika berguna, dan bukti dengan data sensitif disensor."
      - title: "Panduan perbaikan"
        description: "Saran fix spesifik, catatan validasi, dan checklist retest opsional."
    highlights_heading: "Sorotan"
