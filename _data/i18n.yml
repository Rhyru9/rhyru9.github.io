  home:
    title: "{{ site.title }}"
    kicker: "// bug bounty · security research · jakarta, id"
    subtitle: "Security researcher focused on web applications, APIs, and responsible vulnerability disclosure."
    intro: "Recognized by NASA, Apple, Ferrari, Belgian Government, and international companies for responsible security research."
    about_heading: "About"
    about:
      - "I'm a self-taught security researcher and bug bounty hunter based in Jakarta, Indonesia. My work focuses on identifying vulnerabilities in web applications, APIs, and business-critical systems through manual testing and deep technical analysis."
      - "I started with CTF competitions and self-study, building a foundation in web exploitation, networking, and programming. Over time, that foundation turned into a track record of responsible disclosures to organizations ranging from local governments to globally recognized companies."
      - "Every disclosure is approached with care — findings are documented clearly, impact is scoped properly, and production systems are never disrupted. That discipline comes from years of working within responsible disclosure frameworks and public bug bounty programs."
    expertise_heading: "Areas of Focus"
    expertise:
      - title: "Web Application Security"
        items: ["Authentication & Authorization", "Business Logic Flaws", "OWASP Top 10", "Session Management"]
      - title: "API & Backend Security"
        items: ["REST & GraphQL APIs", "IDOR & Privilege Escalation", "Data Exposure", "Rate Limiting Bypass"]
      - title: "Vulnerability Research"
        items: ["Responsible Disclosure", "CVE Discovery", "PoC Development", "Security Writeups"]
    badges:
      - "Bug Bounty"
      - "Pentesting"
      - "CVE Research"
      - "Jakarta, ID"
    view_link: "View →"
    stats:
