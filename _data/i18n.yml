    intro: "Didukung track record disclosure ke NASA, pemerintah daerah, dan perusahaan internasional."
    about_heading: "Tentang"
    about:
      - "Pekerjaan saya sederhana untuk dijelaskan: mencari kelemahan keamanan pada website, API, dan sistem bisnis, lalu menjelaskan risikonya dengan bahasa yang bisa dipakai oleh tim teknis maupun non-teknis."
      - "Pendekatannya berasal dari pengalaman bug bounty dan responsible disclosure, di mana setiap temuan harus bisa dibuktikan, didokumentasikan jelas, dan dilaporkan tanpa mengganggu sistem production."
    focus_heading: "Untuk Siapa"
    focus:
      - title: "Bisnis lokal & startup"
        description: "Butuh pemeriksaan keamanan praktis sebelum launch, setelah update besar, atau sebelum mengelola lebih banyak data pelanggan"
      - title: "Tim IT"
        description: "Butuh sudut pandang kedua untuk login flow, admin panel, API, cloud storage, atau dashboard internal"
      - title: "Recruiter & tim security"
        description: "Butuh bukti pengalaman vulnerability research, reporting yang jelas, dan responsible disclosure"
    services_heading: "Layanan"
    service_labels:
      deliverables: "Output"
      pricing: "Harga"
    services:
      - title: "Web & API Security Review"
        description: "Pengujian manual untuk login, hak akses, paparan data, celah logika bisnis, dan kerentanan web umum."
        deliverables: "Laporan berisi proof-of-concept, severity, impact, endpoint terdampak, dan panduan perbaikan."
        price: "Mulai dari Rp 3.000.000 untuk scope terbatas."
      - title: "Startup Security Check"
        description: "Review terfokus untuk produk tahap awal yang perlu menurunkan risiko sebelum launch atau demo ke investor/pelanggan."
        deliverables: "Daftar isu prioritas, quick wins, dan ringkasan risiko dalam bahasa bisnis."
        price: "Mulai dari Rp 2.000.000 untuk produk kecil atau alur landing-to-dashboard."
      - title: "Vulnerability Verification"
        description: "Validasi dugaan celah dari laporan, scanner, log, atau submission eksternal."
        deliverables: "Impact yang terkonfirmasi, langkah reproduksi, catatan false positive, dan rekomendasi tindakan berikutnya."
        price: "Mulai dari Rp 1.500.000 untuk 3-5 temuan awal atau satu submission eksternal."
    timeline: "Estimasi pengerjaan untuk sebagian besar scope kecil: 3-7 hari kerja, tergantung kompleksitas sistem."
    report_heading: "Yang Diterima Klien"
    report_intro: "Laporan keamanan ringkas, ditulis agar owner memahami risiko dan developer bisa langsung memperbaiki."
