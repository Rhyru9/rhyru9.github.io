url: "https://rhyru9.xyz"
baseurl: ""
default_lang: "en"
languages: ["en", "id"]

# Profile
profile_image: "/assets/images/profile.jpg"
location: "Jakarta, Indonesia"
bio: "Bug Bounty Hunter · Security Researcher<br>Based in Jakarta, Indonesia"

# Social
github_username: rhyru9
linkedin_username: rhyru9
twitter_username: rhyru9
# HackerOne/Bugcrowd profile
hackerone_username: rhyru9
# bugcrowd_username: rhyru9

# Google Scholar (optional)
# google_scholar: "https://scholar.google.com/citations?user=XXXXX"

# Google Analytics (optional)
google_analytics: "G-0QF9Y2TV2T"

# Navigation
navigation:
  - title: "About"
    url: "/"
  - title: "Blog"
    url: "/blog/"
  - title: "Achievements"
    url: "/achievements/"
  - title: "CV"
    url: "/cv/"
  - title: "Contact"
    url: "/contact/"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

sass:
  style: compressed
  sass_dir: _sass

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Include _pages directory
include:
  - _pages

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - fix.sh
  - vendor
