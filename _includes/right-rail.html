<!--
  Decorative right rail (desktop only).
  Vertical brand text + pixel dots — no interactive elements.
-->
<aside class="rail" aria-hidden="true">
  <div class="rail__top">
    <span class="rail__mark">v1</span>
    <span class="rail__dot rail__dot--on"></span>
    <span class="rail__dot"></span>
    <span class="rail__dot"></span>
  </div>
  <div class="rail__mid">{{ site.title | upcase }} &middot; PORTFOLIO &middot; {{ 'now' | date: '%Y' }}</div>
  <div class="rail__bot">
    <span class="rail__mark">&#9650;</span>
    <span class="rail__mark">EOF</span>
  </div>
</aside>
