<!--
  Theme swatches — reusable.
  Param: include.compact (bool) → tighter sizing for sidebar rail.
-->
<div class="theme-switcher {% if include.compact %}theme-switcher--compact{% endif %}" role="group" aria-label="Color theme">
  <button class="theme-switcher__swatch theme-switcher__swatch--light"        data-theme="light"         title="Light"         aria-label="Light theme"         type="button"></button>
  <button class="theme-switcher__swatch theme-switcher__swatch--dark"         data-theme="dark"          title="Dark"          aria-label="Dark theme"          type="button"></button>
  <button class="theme-switcher__swatch theme-switcher__swatch--gruvbox-light" data-theme="gruvbox-light" title="Gruvbox Light" aria-label="Gruvbox Light theme" type="button"></button>
  <button class="theme-switcher__swatch theme-switcher__swatch--gruvbox-dim"   data-theme="gruvbox-dim"   title="Gruvbox Dim"   aria-label="Gruvbox Dim theme"   type="button"></button>
  <button class="theme-switcher__swatch theme-switcher__swatch--gruvbox-dark"  data-theme="gruvbox-dark"  title="Gruvbox Dark"  aria-label="Gruvbox Dark theme"  type="button"></button>
</div>
